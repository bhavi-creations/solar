<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Navbar</title>

<style>
/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: #333;
  color: white;
  position: sticky;
  top: 0;
  z-index: 100;
}

/* Logo */
.navbar .logo {
  font-size: 24px;
  font-weight: bold;
  letter-spacing: 1px;
}

/* Menu */
.navbar ul {
  list-style: none;
  display: flex;
  gap: 40px;
}

.navbar ul li {
  position: relative;
}

.navbar ul li a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  padding: 5px 0;
  display: inline-block;
  position: relative;
  transition: color 0.3s;
}

/* 1st menu: top & bottom lines */
.navbar ul li:nth-child(1) a::before,
.navbar ul li:nth-child(1) a::after {
  content: "";
  position: absolute;
  left: 0;
  width: 0;
  height: 2px;
  background: #ffcc00;
  transition: width 0.3s;
}

.navbar ul li:nth-child(1) a::before { top: 0; }
.navbar ul li:nth-child(1) a::after { bottom: 0                                                                                                                                                                                                                                                         ; }

.navbar ul li:nth-child(1) a:hover::before,
.navbar ul li:nth-child(1) a:hover::after {
  width: 100%;
}

/* 2nd menu: bottom underline slides from left */
.navbar ul li:nth-child(2) a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;
  width: 0;
  height: 2px;
  background: #00ffcc;
  transition: width 0.5s;
}

.navbar ul li:nth-child(2) a:hover::after {
  width: 100%;
}

/* 3rd menu: letters wave on hover */
.navbar ul li:nth-child(3) a span {
  display: inline-block;
  transition: transform 0.3s;
}

.navbar ul li:nth-child(3) a:hover span:nth-child(1) { transform: translateY(-5px); }
.navbar ul li:nth-child(3) a:hover span:nth-child(2) { transform: translateY(-10px); }
.navbar ul li:nth-child(3) a:hover span:nth-child(3) { transform: translateY(-5px); }

/* 4th menu: background slide from left */
.navbar ul li:nth-child(4) a::before {
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;
  height: 100%;
  width: 0;
  background: #ff66cc;
  z-index: -1;
  transition: width 0.3s;
}

.navbar ul li:nth-child(4) a:hover::before {
  width: 100%;
}

/* 5th menu: scale up on hover */
.navbar ul li:nth-child(5) a {
  transition: transform 0.3s, color 0.3s;
}

.navbar ul li:nth-child(5) a:hover {
  transform: scale(1.2);
  color: #00ff00;
}

/* Responsive */
@media (max-width: 768px) {
  .navbar {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  .navbar ul {
    flex-direction: column;
    gap: 15px;
  }
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">MyLogo</div>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#"><span>About</span></a></li>
    <li><a href="#">Portfolio</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</div> 

<p>one of the best soft ware company is <b><q>bhavicreation</q></b>  brits work on website ,social media,seo,designer</p>
</body>
</html>
